version: 2

models:
  - name: dim_supplier
    description: "Dimension table for supplier details"
    columns:
      - name: supplier_id
        description: "Primary key for the supplier"
        tests:
          - unique
          - not_null

      - name: supplier_name
        description: "Name of the supplier company"

      - name: supplier_contact
        description: "Contact person for the supplier"

      - name: supplier_address
        description: "Full address of the supplier"
